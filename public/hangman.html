<!doctype html><html lang="id"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Tebak Kata Indonesia</title><style>
:root{--bg:#0b1220;--panel:#121a2b;--border:#25314f;--txt:#e8eefc;--muted:#9fb0d8}:root.light{--bg:#eef3ff;--panel:#fff;--border:#c5d2ec;--txt:#111827;--muted:#4b5563}*{box-sizing:border-box;transition:background-color .25s,color .25s,border-color .25s}
body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--txt)}
.wrap{max-width:820px;margin:0 auto;padding:12px}.back{color:#d5e2ff;text-decoration:none;border:1px solid #2e4166;padding:8px 11px;border-radius:10px;background:#111a2d}
.card{margin-top:10px;background:linear-gradient(180deg,var(--panel),#10192c);border:1px solid var(--border);border-radius:16px;padding:12px}
.status{padding:10px;border-radius:10px;background:#0f1727;border:1px solid #2b3d63;margin-bottom:8px}
.kata{letter-spacing:2px;font-size:clamp(24px,7vw,38px);text-align:center;margin:8px 0;line-height:1.45;white-space:pre-wrap;word-spacing:4px}
.hint{color:#c8d7ff;background:#0f1727;border:1px dashed #38507e;border-radius:10px;padding:8px;margin:8px 0}
.bank{display:flex;flex-wrap:wrap;gap:6px}.k{padding:9px 10px;border-radius:10px;border:1px solid #33486f;background:#132341;color:#fff;font-weight:800}.k.used{opacity:.35}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.pill{background:#0f1727;border:1px solid #2c3b5d;border-radius:11px;padding:10px}
.restart{margin-top:10px;padding:12px 16px;border-radius:12px;border:1px solid #3868c0;background:linear-gradient(180deg,#2450a5,#1b3d80);color:#fff;font-weight:800;cursor:pointer}
</style></head><body><div class="wrap"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><a class="back" href="/">← Dashboard</a><button id="themeBtn" class="back" style="min-width:52px"><span id="themeIcon">🌙</span></button></div><h1>🇮🇩 Tebak Kata</h1><p style="color:#9fb0d8">Hint 1 kata. Tebak kalimat lucu.</p>
<div class="card"><div id="status" class="status">Memulai game...</div><div id="hint" class="hint"></div><div id="kata" class="kata"></div><div id="bank" class="bank"></div><div class="stats"><div class="pill">Kesalahan: <b><span id="salah">0</span>/6</b></div><div class="pill">Huruf terpakai: <span id="pakai">-</span></div></div><button id="baru" class="restart">🔁 Kata Baru</button></div></div>
<script>
const ALPHA='abcdefghijklmnopqrstuvwxyz';
let cur={phrase:'CIE YANG JOMBLO',hint:'romantis'}, used=new Set(), wrong=0, done=false;
let sessionCtx=null;
const kataEl=document.getElementById('kata'),hint=document.getElementById('hint'),st=document.getElementById('status'),salah=document.getElementById('salah'),pakai=document.getElementById('pakai'),bank=document.getElementById('bank');

function normalizePhrase(p){ return String(p||'').toUpperCase().replace(/[^A-Z\s]/g,' ').replace(/\s+/g,' ').trim(); }
function masked(){
  const words = cur.phrase.split(' ').map(word =>
    word.split('').map(ch => used.has(ch.toLowerCase()) ? ch : '_').join(' ')
  );
  const lines = [];
  let curLine = '';
  for (const w of words) {
    const candidate = curLine ? (curLine + '   ' + w) : w;
    if (candidate.length > 24) { lines.push(curLine); curLine = w; }
    else curLine = candidate;
  }
  if (curLine) lines.push(curLine);
  return lines.join('\n');
}
function draw(){ kataEl.textContent=masked(); salah.textContent=wrong; pakai.textContent=used.size?[...used].join(', '):'-'; }
function setStatus(m,t='i'){ st.textContent=m; st.style.borderColor=t==='ok'?'#2e6b44':t==='bad'?'#6b2e2e':'#2b3d63'; }
function score(win){ const letters=cur.phrase.replace(/\s/g,''); const benar=[...new Set(letters.toLowerCase().split(''))].filter(c=>used.has(c)).length; return (benar*10)+((6-wrong)*15)-(wrong*5)+(win?40:0); }
async function submit(win){
  try{
    if(!sessionCtx){
      const sr=await fetch('/api/session/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'hangman'})});
      const sj=await sr.json(); if(sj?.ok) sessionCtx=sj;
    }
    const payload={game:'hangman',playerName:'Guest',score:score(win),meta:{win,phrase:cur.phrase,wrong,hint:cur.hint},sessionId:sessionCtx?.sessionId,startedAt:sessionCtx?.startedAt,token:sessionCtx?.token};
    await fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }catch{}
}

function press(ch){
  if(done||used.has(ch)) return;
  used.add(ch);
  if(!cur.phrase.toLowerCase().includes(ch)) wrong++;
  const letters=[...new Set(cur.phrase.replace(/\s/g,'').toLowerCase().split(''))];
  const win=letters.every(c=>used.has(c));
  if(win){ done=true; draw(); setStatus('✅ Menang! Kalimat: '+cur.phrase+' • Tekan Kata Baru untuk lanjut.','ok'); submit(true); renderBank(); return; }
  if(wrong>=6){ done=true; draw(); setStatus('❌ Kalah. Kalimat yang benar: '+cur.phrase+' • Tekan Kata Baru untuk lanjut.','bad'); submit(false); renderBank(); return; }
  draw(); setStatus(cur.phrase.toLowerCase().includes(ch)?'Bagus!':'Belum tepat.'); renderBank();
}

function renderBank(){
  const uniq=[...new Set(cur.phrase.toLowerCase().replace(/\s/g,'').split(''))];
  const decoy=[...ALPHA].filter(c=>!uniq.includes(c)).sort(()=>Math.random()-0.5).slice(0,10);
  const letters=[...new Set([...uniq,...decoy])].sort(()=>Math.random()-0.5);
  bank.innerHTML='';
  letters.forEach(ch=>{ const b=document.createElement('button'); b.className='k'+((used.has(ch)||done)?' used':''); b.textContent=ch.toUpperCase(); b.disabled=used.has(ch)||done; b.onclick=()=>press(ch); bank.appendChild(b); });
}

async function kataBaru(){
  sessionCtx=null;
  used=new Set(); wrong=0; done=false;
  try{
    const r=await fetch('/api/hangman/phrase');
    const j=await r.json();
    if(j?.ok && j?.row?.phrase){
      cur={ phrase: normalizePhrase(j.row.phrase), hint: String(j.row.hint||'umum').toLowerCase().split(/\s+/)[0] };
    }
  }catch{}
  hint.textContent='Hint: '+(cur.hint||'umum');
  setStatus('Game dimulai. Tebak kalimat 3-5 kata ini!','ok');
  draw(); renderBank();
}

(function(){const t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.classList.add('light');themeIcon.textContent=t==='light'?'☀️':'🌙';})();
themeBtn.onclick=()=>{document.documentElement.classList.toggle('light');const t=document.documentElement.classList.contains('light')?'light':'dark';localStorage.setItem('theme',t);themeIcon.textContent=t==='light'?'☀️':'🌙';};

document.getElementById('baru').onclick=kataBaru;
kataBaru();
</script></body></html>
