<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quiz Cepat Indonesia</title><style>body{font-family:Inter,system-ui;background:#0b1220;color:#e8eefc;max-width:760px;margin:0 auto;padding:12px}.card{background:#121a2b;border:1px solid #25314f;border-radius:14px;padding:14px}.opt{display:block;width:100%;text-align:left;margin:6px 0;padding:10px;border-radius:10px;border:1px solid #324263;background:#0f1727;color:#fff}.muted{color:#9fb0d8}</style></head><body><a href="/" style="color:#cfe0ff">← Dashboard</a><h1>⚡ Quiz Cepat Indonesia</h1><div class="card"><p id="q">...</p><div id="opts"></div><p id="st" class="muted"></p><p>Skor: <b id="sc">0</b> | Streak: <b id="streak">0</b></p></div><script>
const Q=[{q:'Ibu kota Indonesia?',o:['Bandung','Jakarta','Surabaya'],a:1},{q:'Bendera Indonesia berwarna?',o:['Merah Putih','Biru Putih','Merah Kuning'],a:0},{q:'Pulau Komodo ada di?',o:['NTT','Aceh','Papua'],a:0},{q:'Bahasa nasional Indonesia?',o:['Jawa','Indonesia','Sunda'],a:1},{q:'Monas ada di?',o:['Jakarta','Medan','Makassar'],a:0}];
let i=0,score=0,streak=0; const q=document.getElementById('q'),opts=document.getElementById('opts'),st=document.getElementById('st'),sc=document.getElementById('sc'),sk=document.getElementById('streak');
function load(){ if(i>=Q.length) return finish(); const cur=Q[i]; q.textContent=cur.q; opts.innerHTML=''; cur.o.forEach((x,idx)=>{const b=document.createElement('button'); b.className='opt'; b.textContent=x; b.onclick=()=>pick(idx); opts.appendChild(b);}); }
function pick(idx){const cur=Q[i]; if(idx===cur.a){streak++; const add=100+(streak-1)*20; score+=add; st.textContent='✅ Benar +'+add;} else {streak=0; st.textContent='❌ Salah';} sc.textContent=score; sk.textContent=streak; i++; setTimeout(load,300)}
async function finish(){st.textContent='Selesai!'; try{await fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'quiz-cepat',playerName:'Guest',score,meta:{total:Q.length}})});}catch{}}
load();
</script></body></html>
