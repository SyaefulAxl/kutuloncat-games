<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memory Card Nusantara</title><style>body{font-family:Inter,system-ui;background:#0b1220;color:#e8eefc;max-width:760px;margin:0 auto;padding:12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.c{aspect-ratio:1;border-radius:10px;border:1px solid #324263;background:#0f1727;color:#fff;font-size:28px}.hide{color:transparent}.top{margin-bottom:10px}</style></head><body><a href="/" style="color:#cfe0ff">← Dashboard</a><h1>🧠 Memory Card Nusantara</h1><div class="top">Skor: <b id="sc">0</b> | Match: <b id="m">0</b>/6</div><div id="g" class="grid"></div><p id="st"></p><script>
const icons=['🦅','🗼','🏝️','🐉','🌋','🥁']; let arr=[...icons,...icons].sort(()=>Math.random()-0.5);
let open=[],lock=false,match=0,score=0,mis=0; const g=document.getElementById('g'),sc=document.getElementById('sc'),m=document.getElementById('m'),st=document.getElementById('st');
function draw(){g.innerHTML=''; arr.forEach((v,i)=>{const b=document.createElement('button'); b.className='c'; const opened=open.includes(i)||v===''; b.textContent=opened?(v||'✓'):'?'; if(!opened)b.classList.add('hide'); b.onclick=()=>tap(i); g.appendChild(b);});}
function tap(i){if(lock||arr[i]===''||open.includes(i))return; open.push(i); draw(); if(open.length<2)return; lock=true; const [a,b]=open; if(arr[a]===arr[b]){setTimeout(()=>{arr[a]=arr[b]=''; open=[]; lock=false; match++; score+=40; sc.textContent=score; m.textContent=match; if(match===6) finish(); draw();},220);} else {setTimeout(()=>{open=[]; lock=false; mis++; score=Math.max(0,score-10); sc.textContent=score; st.textContent='Salah pair -10'; draw();},500);} }
async function finish(){st.textContent='Selesai!'; try{await fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'memory-card',playerName:'Guest',score,meta:{mismatch:mis}})});}catch{}}
draw();
</script></body></html>
