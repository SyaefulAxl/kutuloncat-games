<!doctype html><html lang="id"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>KutuLoncat Games</title><style>
:root{--bg:#091224;--panel:#101c33;--txt:#eaf0ff;--muted:#a7b3d5;--border:#2a3a62;--pri:#2563eb}
:root.light{--bg:#eef3ff;--panel:#ffffff;--txt:#111827;--muted:#4b5563;--border:#c5d2ec;--pri:#1d4ed8}
*{box-sizing:border-box;transition:background-color .25s,color .25s,border-color .25s,opacity .2s}
body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--txt)}
.container{max-width:1080px;margin:0 auto;padding:14px}
.nav{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:10px 12px}
.brand{font-weight:800;font-size:18px}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--txt);text-decoration:none;cursor:pointer;font-weight:600}
.btn.primary{background:linear-gradient(180deg,#2f63cb,#1e4ea8);color:#fff;border-color:#3557a0}
.theme-btn{width:44px;height:40px;padding:0}
.theme-ico{display:inline-block;transition:transform .35s ease}
:root.light .theme-ico{transform:rotate(180deg) scale(1.05)}
.hero{margin-top:12px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px}
.grid{margin-top:12px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px}
.card h3{margin:0 0 6px}.muted{color:var(--muted)}
.kpi{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:10px}
.pill{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px}
@media(max-width:860px){.grid{grid-template-columns:1fr}.kpi{grid-template-columns:1fr}.actions{width:100%}}
</style></head><body><div class="container">
  <div class="nav">
    <div class="brand">🎮 KutuLoncat Games</div>
    <div class="actions">
      <button id="themeBtn" class="btn theme-btn"><span id="themeIcon" class="theme-ico">🌙</span></button>
      <a class="btn" href="/profile">👤 Profil</a>
      <a class="btn" href="/achievements">🏅 Achievement</a>
      <a class="btn" href="/leaderboard">🏆 Leaderboard</a>
      <button id="logout" class="btn primary">Logout</button>
    </div>
  </div>

  <section class="hero">
    <h1 id="welcome" style="margin:0 0 6px">Selamat datang!</h1>
    <div class="muted">Main game, kumpulkan skor, dan buka achievement kamu.</div>
    <div class="kpi">
      <div class="pill"><b id="kpiName">-</b><div class="muted">Member</div></div>
      <div class="pill"><b id="kpiPhone">-</b><div class="muted">No. WA</div></div>
      <div class="pill"><b id="kpiLogin">0</b><div class="muted">Login count</div></div>
    </div>
  </section>

  <section class="grid">
    <article class="card"><h3>🇮🇩 Tebak Kata</h3><p class="muted">Kalimat roast/galau + hint 1 kata.</p><a class="btn primary" href="/hangman">Mainkan</a></article>
    <article class="card"><h3>🍉 Fruit Ninja</h3><p class="muted">Difficulty bertahap dari santai ke menantang.</p><a class="btn primary" href="/fruit-ninja">Mainkan</a></article>
  </section>
</div>
<script>
(function(){const t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.classList.add('light');themeIcon.textContent=t==='light'?'☀️':'🌙';})();
themeBtn.onclick=()=>{document.documentElement.classList.toggle('light');const t=document.documentElement.classList.contains('light')?'light':'dark';localStorage.setItem('theme',t);themeIcon.textContent=t==='light'?'☀️':'🌙';};
logout.onclick=async()=>{await fetch('/api/auth/logout',{method:'POST'});location.href='/login';};
fetch('/api/me').then(r=>r.json()).then(j=>{if(j.ok){welcome.textContent='Selamat datang, '+(j.user.name||'Member')+'!';kpiName.textContent=j.user.name||'-';kpiPhone.textContent=j.user.phone||'-';kpiLogin.textContent=String(j.user.loginCount||0);}else{location.href='/login';}});
</script></body></html>
