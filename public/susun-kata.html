<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Susun Kata Indonesia</title><style>body{font-family:Inter,system-ui;background:#0b1220;color:#e8eefc;max-width:760px;margin:0 auto;padding:12px}.card{background:#121a2b;border:1px solid #25314f;border-radius:14px;padding:14px}.scr{font-size:32px;letter-spacing:4px;text-align:center;margin:10px 0}input,button{padding:10px;border-radius:10px;border:1px solid #324263;background:#0f1727;color:#fff}button{cursor:pointer}.row{display:flex;gap:8px}.muted{color:#9fb0d8}</style></head><body><a href="/" style="color:#cfe0ff">← Dashboard</a><h1>🔤 Susun Kata Indonesia</h1><div class="card"><p class="muted">Susun huruf acak jadi kata benar.</p><div id="scr" class="scr"></div><div class="row"><input id="ans" style="flex:1" placeholder="Jawaban"><button id="ok">Cek</button></div><p id="st"></p><p>Skor: <b id="sc">0</b> | Round: <b id="rd">1</b>/5</p></div><script>
const WORDS=['indonesia','semangka','teknologi','otomasi','jaringan','nusantara'];
let order=[...WORDS].sort(()=>Math.random()-0.5).slice(0,5),idx=0,score=0,start=Date.now();
const scr=document.getElementById('scr'),ans=document.getElementById('ans'),st=document.getElementById('st'),sc=document.getElementById('sc'),rd=document.getElementById('rd');
function jumble(w){return w.split('').sort(()=>Math.random()-0.5).join('')}
function load(){if(idx>=order.length)return finish(); const w=order[idx]; let j=jumble(w); if(j===w) j=jumble(w); scr.textContent=j.toUpperCase(); rd.textContent=(idx+1); ans.value=''; ans.focus(); start=Date.now();}
function check(){const w=order[idx],t=ans.value.trim().toLowerCase(); if(t===w){const dt=Math.floor((Date.now()-start)/1000); const add=80+Math.max(0,30-dt); score+=add; st.textContent='✅ Benar +'+add; sc.textContent=score;} else st.textContent='❌ Salah, kata: '+w; idx++; setTimeout(load,500)}
async function finish(){st.textContent='Selesai!'; try{await fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'susun-kata',playerName:'Guest',score,meta:{round:order.length}})});}catch{}}
document.getElementById('ok').onclick=check; ans.addEventListener('keydown',e=>{if(e.key==='Enter')check()}); load();
</script></body></html>
