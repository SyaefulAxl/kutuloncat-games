<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fruit Ninja Nusantara</title>
  <style>
    :root{--bg:#091224;--panel:#101c33;--txt:#e8eefc;--muted:#a9b6da;--border:#2a3a62}
    :root.light{--bg:#eef3ff;--panel:#ffffff;--txt:#111827;--muted:#4b5563;--border:#c5d2ec}
    *{box-sizing:border-box;transition:background-color .25s,color .25s,border-color .25s}
    body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,Arial,sans-serif}
    .wrap{max-width:920px;margin:0 auto;padding:10px}
    .top{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
    .badge{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:14px}
    .badge b{font-size:18px}
    canvas{width:100%;height:62vh;max-height:560px;min-height:360px;background:radial-gradient(circle at 50% -30%,#1b3468,#0f1f3a 62%);border:1px solid var(--border);border-radius:14px;touch-action:none;display:block}
    .controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
    button,a{padding:10px 12px;border-radius:10px;border:1px solid #2a3a62;background:#0e1730;color:var(--txt);text-decoration:none}
    .hint{opacity:.9;font-size:13px;color:var(--muted)}
    @media (max-width:480px){ canvas{height:56vh;min-height:320px;} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="/" style="text-decoration:none;color:#d7e5ff">← Dashboard</a>
      <button id="themeBtn" style="padding:8px 10px;border-radius:10px;border:1px solid #2a3a62;background:#0e1730;color:#fff;cursor:pointer"><span id="themeIcon">🌙</span></button>
      <div class="badge">🎯 Skor: <b id="skor">0</b></div>
      <div class="badge">❤️ Nyawa: <b id="nyawa">3</b></div>
      <div class="badge">🔥 Kombo: <b id="kombo">0</b></div>
    </div>
    <canvas id="game"></canvas>
    <div class="controls">
      <button id="mulai">Mulai Ulang</button>
      <div id="info" class="hint">Geser layar untuk memotong buah. Hindari bom.</div>
    </div>
  </div>
<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const ui={skor:document.getElementById('skor'), nyawa:document.getElementById('nyawa'), kombo:document.getElementById('kombo'), info:document.getElementById('info')};
const fruits=['🍉','🍎','🍊','🍌','🥭','🍍','🍓','🍇'];

let sessionCtx=null;

const state={
  skor:0, nyawa:3, kombo:0, over:false,
  objects:[], particles:[], halves:[], slash:[],
  lastSpawn:0, lastTs:0, isPointerDown:false, lastPointerMove:0, lastDamageTs:0, slices:0, submittedScore:false, sessionStart:0, chaosUntil:0,
  cfg:{stageSeconds:[60,150,240],maxByStage:[6,8,10,13],gapByStage:[780,660,540,430],burstMin:[1,1,1,1],burstMax:[2,3,4,6],weirdChance:[0.06,0.10,0.14,0.18],bombBase:[0.10,0.12,0.14,0.17],safeBombDistance:70}
};


async function loadSettings(){
  try{
    const r=await fetch('/api/admin/settings'); const j=await r.json();
    if(j?.settings?.fruitNinja){ state.cfg = { ...state.cfg, ...j.settings.fruitNinja }; }
  }catch{}
}

function resizeCanvas(){
  const r=cv.getBoundingClientRect();
  const dpr=Math.min(2, window.devicePixelRatio||1);
  cv.width=Math.max(320, Math.floor(r.width*dpr));
  cv.height=Math.max(320, Math.floor(r.height*dpr));
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr,dpr);
}
function W(){ return cv.getBoundingClientRect().width; }
function H(){ return cv.getBoundingClientRect().height; }

function syncUI(){ ui.skor.textContent=state.skor; ui.nyawa.textContent=state.nyawa; ui.kombo.textContent=state.kombo; }
function info(msg){ ui.info.textContent=msg; }
function reset(){
  sessionCtx=null;
  Object.assign(state,{skor:0,nyawa:3,kombo:0,over:false,objects:[],particles:[],halves:[],slash:[],lastSpawn:0,lastTs:0,isPointerDown:false,lastPointerMove:0,lastDamageTs:0,slices:0,submittedScore:false,sessionStart:performance.now(),chaosUntil:0});
  syncUI(); info('Geser layar untuk memotong buah. Hindari bom.');
}
function rand(min,max){ return Math.random()*(max-min)+min; }

function applyDamage(reason){
  const now=performance.now();
  if(now-state.lastDamageTs<520) return false;
  state.nyawa=Math.max(0,state.nyawa-1);
  state.lastDamageTs=now;
  state.kombo=0;
  syncUI();
  if(reason==='bomb') info('💥 Kena bom! Nyawa -1');
  if(reason==='miss') info('⚠️ Buah terlewat! Nyawa -1');
  if(state.nyawa<=0) state.over=true;
  return true;
}

function spawn(level=1, weird=false){
  const w=W(), h=H();
  const base = state.cfg.bombBase || [0.10,0.12,0.14,0.17];
  const stageBombBase = base[Math.min(base.length-1, Math.max(0, level-1))] || 0.12;
  const bombChance = Math.min(0.28, stageBombBase + (Math.random()*0.06) + (weird?0.03:0));
  const isBomb=Math.random()<bombChance;
  const r=rand(34,50);

  // variasi tinggi lemparan: kadang rendah, kadang tinggi
  const arc = weird ? rand(1.05,1.35) : rand(0.90,1.20);
  const vxBase = weird ? rand(-1.5,1.5) : rand(-1.1,1.1);
  const vyBase = rand(-9.0,-7.2) * arc; // makin negatif = terbang lebih tinggi

  state.objects.push({
    x:rand(65,w-65), y:h+32,
    vx:vxBase,
    vy:vyBase,
    g:0.19 + Math.min(0.12, level*0.018),
    r, type:isBomb?'bomb':'fruit', emoji:isBomb?'💣':fruits[Math.floor(Math.random()*fruits.length)], hit:false
  });
}

function addFruitSplit(o){
  const left={x:o.x-5,y:o.y,vx:o.vx-1.8,vy:o.vy-1,rot:0,vr:-0.08,emoji:o.emoji,life:34};
  const right={x:o.x+5,y:o.y,vx:o.vx+1.8,vy:o.vy-1,rot:0,vr:0.08,emoji:o.emoji,life:34};
  state.halves.push(left,right);
  for(let i=0;i<12;i++) state.particles.push({x:o.x,y:o.y,vx:rand(-2.6,2.6),vy:rand(-2.6,1.2),life:20,sz:rand(2,4),color:'rgba(255,220,120,0.9)'});
}
function addBombEffect(o){ for(let i=0;i<20;i++) state.particles.push({x:o.x,y:o.y,vx:rand(-4,4),vy:rand(-4,4),life:24,sz:rand(2,5),color:'rgba(255,110,110,0.9)'}); }

function drawEmoji(emoji,x,y,size,rot=0,alpha=1){ ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=alpha; ctx.font=`${size}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(emoji,0,0); ctx.restore(); }

function distToSegment(px,py,x1,y1,x2,y2){
  const A=px-x1,B=py-y1,C=x2-x1,D=y2-y1; const dot=A*C+B*D; const len=C*C+D*D;
  let t=len?dot/len:0; t=Math.max(0,Math.min(1,t)); const x=x1+t*C,y=y1+t*D; const dx=px-x,dy=py-y; return Math.hypot(dx,dy);
}

function processSlashHit(){
  if(state.slash.length<2 || state.over) return;
  const a=state.slash[state.slash.length-2], b=state.slash[state.slash.length-1];
  const hits=[];
  for(const o of state.objects){
    if(o.hit) continue;
    const d=distToSegment(o.x,o.y,a.x,a.y,b.x,b.y);
    const hitRadius = o.type==='bomb' ? o.r*0.52 : o.r*0.95;
    if(d<hitRadius) hits.push(o);
  }
  if(!hits.length) return;
  const fruitHits=hits.filter(x=>x.type==='fruit');
  const bombHits=hits.filter(x=>x.type==='bomb');
  const safeDist = Number(state.cfg.safeBombDistance||70);

  if(fruitHits.length){
    for(const o of fruitHits){ if(o.hit) continue; o.hit=true; state.skor += 10 + Math.min(26, state.kombo*2); state.kombo += 1; state.slices += 1; addFruitSplit(o); }
    syncUI(); info('✅ Buah terpotong!');
    return;
  }
  if(bombHits.length){
    const closeFruit = fruitHits.some(f=> Math.hypot(f.x-bombHits[0].x,f.y-bombHits[0].y) < safeDist);
    if(!closeFruit){ bombHits[0].hit=true; addBombEffect(bombHits[0]); applyDamage('bomb'); }
  }
}


async function submitScoreIfNeeded(){
  if(!state.over || state.submittedScore) return;
  state.submittedScore = true;
  const finalScore = Math.max(0, Math.round(state.skor));
  try {
    if(!sessionCtx){
      const sr=await fetch('/api/session/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'fruit-ninja'})});
      const sj=await sr.json(); if(sj?.ok) sessionCtx=sj;
    }
    await fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'fruit-ninja',playerName:'Guest',score:finalScore,meta:{slices:state.slices,nyawa:state.nyawa},sessionId:sessionCtx?.sessionId,startedAt:sessionCtx?.startedAt,token:sessionCtx?.token})});
  } catch {}
}

function update(ts){
  if(!state.lastTs) state.lastTs=ts;
  const dt=Math.min(2,(ts-state.lastTs)/16.67); state.lastTs=ts;
  const w=W(), h=H();

  ctx.clearRect(0,0,w,h);

  // difficulty curve: fun 3 menit pertama, tegang di menit 4+
  const elapsed = (performance.now() - (state.sessionStart || performance.now()))/1000;
  const cuts = state.cfg.stageSeconds || [60,150,240];
  const stage = elapsed < cuts[0] ? 0 : elapsed < cuts[1] ? 1 : elapsed < cuts[2] ? 2 : 3;

  const maxArr = state.cfg.maxByStage || [6,8,10,13];
  const gapArr = state.cfg.gapByStage || [780,660,540,430];
  const bMin = state.cfg.burstMin || [1,1,1,1];
  const bMax = state.cfg.burstMax || [2,3,4,6];
  const weirdArr = state.cfg.weirdChance || [0.06,0.10,0.14,0.18];

  const maxObjects = maxArr[Math.min(3,stage)] || 8;
  const spawnGap = state.over ? 999999 : (gapArr[Math.min(3,stage)] || 700);

  if(!state.over && ts-state.lastSpawn>spawnGap && state.objects.length<maxObjects){
    const lo = bMin[Math.min(3,stage)] || 1;
    const hi = bMax[Math.min(3,stage)] || 3;
    const burst = lo + Math.floor(Math.random() * (Math.max(lo,hi) - lo + 1));
    for (let i=0; i<burst && state.objects.length<maxObjects; i++) {
      const weird = Math.random() < (weirdArr[Math.min(3,stage)] || 0.1);
      spawn(stage+1, weird);
    }
    if (stage>=2 && Math.random()<0.28) info('⚡ Fokus! Ritme mulai liar.');
    state.lastSpawn=ts;
  }

  for(const o of state.objects){
    o.x += o.vx*dt; o.y += o.vy*dt; o.vy += o.g*dt;
    // keep inside frame horizontally
    if(o.x < 24){ o.x=24; o.vx=Math.abs(o.vx)*0.7; }
    if(o.x > w-24){ o.x=w-24; o.vx=-Math.abs(o.vx)*0.7; }
    drawEmoji(o.emoji,o.x,o.y,o.r*1.45);
  }

  state.objects = state.objects.filter(o=>{
    if(o.y>h+60){
      if(o.type==='fruit' && !o.hit && !state.over) applyDamage('miss');
      return false;
    }
    return !o.hit;
  });

  for(const hlf of state.halves){ hlf.x+=hlf.vx*dt; hlf.y+=hlf.vy*dt; hlf.vy+=0.24*dt; hlf.rot+=hlf.vr*dt; hlf.life-=1*dt; drawEmoji(hlf.emoji,hlf.x,hlf.y,42,hlf.rot,Math.max(0,hlf.life/34)); }
  state.halves = state.halves.filter(x=>x.life>0);

  for(const p of state.particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.14*dt; p.life-=1*dt; ctx.globalAlpha=Math.max(0,p.life/24); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
  state.particles = state.particles.filter(x=>x.life>0);

  if(state.slash.length){
    ctx.beginPath(); ctx.lineWidth=6; ctx.strokeStyle='rgba(255,255,255,0.78)';
    for(let i=0;i<state.slash.length;i++){ const p=state.slash[i]; if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); }
    ctx.stroke();
  }
  if(!state.over && ts-state.lastPointerMove>560) state.slash=[];

  if(state.over){
    submitScoreIfNeeded();
    ctx.fillStyle='rgba(0,0,0,.46)'; ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='bold 34px system-ui'; ctx.fillText('Game Selesai', w/2, h/2-8);
    ctx.font='20px system-ui'; ctx.fillText(`Skor Akhir: ${state.skor}`, w/2, h/2+26);
  }
  requestAnimationFrame(update);
}

function pointFromEvent(e){
  const r=cv.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX-r.left, y:t.clientY-r.top};
}

function beginStroke(e){ const p=pointFromEvent(e); state.slash=[p]; state.lastPointerMove=performance.now(); if(e.type.startsWith('touch')) state.isPointerDown=true; e.preventDefault?.(); }
function moveStroke(e){ if(e.type.startsWith('touch') && !state.isPointerDown) return; const p=pointFromEvent(e); state.slash.push(p); if(state.slash.length>16) state.slash.shift(); state.lastPointerMove=performance.now(); processSlashHit(); e.preventDefault?.(); }
function endStroke(){ state.isPointerDown=false; setTimeout(()=>state.slash=[],70); }

cv.addEventListener('mousedown',beginStroke);
cv.addEventListener('mousemove',moveStroke);
window.addEventListener('mouseup',endStroke);
cv.addEventListener('touchstart',beginStroke,{passive:false});
cv.addEventListener('touchmove',moveStroke,{passive:false});
window.addEventListener('touchend',endStroke,{passive:false});
window.addEventListener('resize',resizeCanvas);

document.getElementById('mulai').onclick=reset;
(function(){const t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.classList.add('light');themeIcon.textContent=t==='light'?'☀️':'🌙';})();
themeBtn.onclick=()=>{document.documentElement.classList.toggle('light');const t=document.documentElement.classList.contains('light')?'light':'dark';localStorage.setItem('theme',t);themeIcon.textContent=t==='light'?'☀️':'🌙';};

loadSettings().then(async ()=>{ try{const sr=await fetch('/api/session/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'fruit-ninja'})}); const sj=await sr.json(); if(sj?.ok) sessionCtx=sj;}catch{} resizeCanvas(); reset(); requestAnimationFrame(update); });
</script>
</body>
</html>
