<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tebak Gambar Nusantara</title><style>body{font-family:Inter,system-ui;background:#0b1220;color:#e8eefc;max-width:760px;margin:0 auto;padding:12px}.card{background:#121a2b;border:1px solid #25314f;border-radius:14px;padding:14px}.img{font-size:90px;text-align:center;margin:8px 0}input,button{padding:10px;border-radius:10px;border:1px solid #324263;background:#0f1727;color:#fff}button{cursor:pointer}.row{display:flex;gap:8px}.muted{color:#9fb0d8}</style></head><body><a href="/" style="color:#cfe0ff">← Dashboard</a><h1>🖼️ Tebak Gambar Nusantara</h1><div class="card"><p id="q" class="muted"></p><div id="img" class="img">🏝️</div><div class="row"><input id="ans" placeholder="Jawaban..." style="flex:1"><button id="ok">Jawab</button></div><p id="st"></p><p>Skor: <b id="sc">0</b> | Sisa soal: <b id="left">0</b></p></div><script>
const BANK=[{e:'🗼',a:'monas'},{e:'🦅',a:'garuda'},{e:'🌋',a:'merapi'},{e:'🏝️',a:'bali'},{e:'🐉',a:'komodo'},{e:'☕',a:'kopi'}];
let q=[],i=0,score=0,start=Date.now();
const qel=q=document.getElementById('q'),img=document.getElementById('img'),ans=document.getElementById('ans'),st=document.getElementById('st'),sc=document.getElementById('sc'),left=document.getElementById('left');
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function load(){if(i>=q.length) return finish(); const cur=q[i]; qel.textContent='Tebak ikon ini'; img.textContent=cur.e; left.textContent=(q.length-i); ans.value=''; ans.focus();}
function check(){const cur=q[i]; const t=ans.value.trim().toLowerCase(); if(t===cur.a){const dt=Math.floor((Date.now()-start)/1000); const add=Math.max(20,100-dt*2); score+=add; st.textContent='✅ Benar! +'+add; sc.textContent=score;} else st.textContent='❌ Salah, jawaban: '+cur.a; i++; start=Date.now(); setTimeout(load,500)}
async function finish(){st.textContent='Selesai!'; left.textContent='0'; try{await fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'tebak-gambar',playerName:'Guest',score,meta:{total:q.length}})});}catch{} }
document.getElementById('ok').onclick=check; ans.addEventListener('keydown',e=>{if(e.key==='Enter')check()}); q=shuffle(BANK).slice(0,5); load();
</script></body></html>
