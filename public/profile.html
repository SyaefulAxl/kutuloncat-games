<!doctype html><html lang="id"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Profil</title><style>:root{--bg:#0b1220;--panel:#121a2b;--txt:#e8eefc;--muted:#9fb0d8;--bd:#25314f;--in:#0f1727}:root.light{--bg:#eef3ff;--panel:#fff;--txt:#111827;--muted:#4b5563;--bd:#c5d2ec;--in:#f8fbff}*{box-sizing:border-box;transition:background-color .25s,color .25s,border-color .25s}body{font-family:Inter,system-ui;background:var(--bg);color:var(--txt);max-width:760px;margin:0 auto;padding:12px}.top{display:flex;justify-content:space-between;align-items:center}.card{background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:12px}input,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid var(--bd);background:var(--in);color:var(--txt)}button{background:#18326a;color:#fff;font-weight:700}.btn{padding:8px 10px;border-radius:8px;border:1px solid #3557a0;background:#18326a;color:#fff;text-decoration:none;cursor:pointer}.theme-btn{max-width:56px}.theme-ico{display:inline-block;transition:transform .35s}:root.light .theme-ico{transform:rotate(180deg)}img{width:88px;height:88px;border-radius:999px;object-fit:cover;border:1px solid var(--bd);background:#111}</style></head><body><div class="top"><a href="/" style="color:#60a5fa">← Dashboard</a><button id="themeBtn" class="btn theme-btn"><span id="themeIcon" class="theme-ico">🌙</span></button></div><h1>👤 Profil Member</h1><div class="card"><div style="display:flex;gap:12px;align-items:center"><img id="avatar" src="" alt="avatar"/><div><div id="phoneLine"></div><div style="color:var(--muted);font-size:12px">Foto: jpg/png/webp max 2MB</div></div></div><input id="name" placeholder="Nama"/><input id="photoFile" type="file" accept="image/png,image/jpeg,image/webp"/><button id="save">Simpan Nama</button><button id="upload">Upload Foto</button><button id="logout">Logout</button><p id="msg"></p></div><script>(function(){const t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.classList.add('light');themeIcon.textContent=t==='light'?'☀️':'🌙';})();themeBtn.onclick=()=>{document.documentElement.classList.toggle('light');const t=document.documentElement.classList.contains('light')?'light':'dark';localStorage.setItem('theme',t);themeIcon.textContent=t==='light'?'☀️':'🌙';};let me=null;async function load(){const r=await fetch('/api/me');const j=await r.json();if(!j.ok){location.href='/login';return;}me=j.user;name.value=me.name||'';phoneLine.textContent='No WA: '+(me.phone||'-');avatar.src=me.photoUrl||'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4OCIgaGVpZ2h0PSI4OCI+PHJlY3Qgd2lkdGg9Ijg4IiBoZWlnaHQ9Ijg4IiBmaWxsPSIjMjIyIi8+PHRleHQgeD0iNDQiIHk9IjQ5IiBmb250LXNpemU9IjE4IiBmaWxsPSIjYWFhIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj7wn5iKPC90ZXh0Pjwvc3ZnPg==';}
save.onclick=async()=>{const r=await fetch('/api/me',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name.value})});const j=await r.json();msg.textContent=j.ok?'✅ Nama tersimpan':'❌ gagal simpan';if(j.ok) me=j.user;};
upload.onclick=async()=>{const f=photoFile.files?.[0];if(!f){msg.textContent='❌ Pilih file foto dulu';return;}if(!/^image\/(png|jpeg|jpg|webp)$/.test(f.type)){msg.textContent='❌ Hanya image (png/jpg/webp)';return;}if(f.size>2*1024*1024){msg.textContent='❌ Max 2MB';return;}const fr=new FileReader();fr.onload=async()=>{const r=await fetch('/api/me/photo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({photoData:fr.result})});const j=await r.json();if(j.ok){avatar.src=j.photoUrl+'?t='+Date.now();msg.textContent='✅ Foto terupload';}else msg.textContent='❌ '+(j.error||'gagal upload');};fr.readAsDataURL(f);};
logout.onclick=async()=>{await fetch('/api/auth/logout',{method:'POST'});location.href='/login';};load();</script></body></html>
