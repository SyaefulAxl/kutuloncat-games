<!doctype html><html lang="id"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Leaderboard</title><style>:root{--bg:#0b1220;--panel:#121a2b;--txt:#e8eefc;--muted:#9fb0d8;--bd:#25314f}:root.light{--bg:#eef3ff;--panel:#fff;--txt:#111827;--muted:#4b5563;--bd:#c5d2ec}*{box-sizing:border-box;transition:background-color .25s,color .25s,border-color .25s}body{font-family:Inter,system-ui;background:var(--bg);color:var(--txt);max-width:900px;margin:0 auto;padding:12px}.top{display:flex;justify-content:space-between;align-items:center}.card{background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:12px;margin:10px 0}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--bd);padding:8px;text-align:left}.btn{padding:8px 10px;border-radius:8px;border:1px solid #3557a0;background:#18326a;color:#fff;text-decoration:none;cursor:pointer}.theme-btn{max-width:56px}.theme-ico{display:inline-block;transition:transform .35s}:root.light .theme-ico{transform:rotate(180deg)}</style></head><body><div class="top"><a href="/" style="color:#60a5fa">← Dashboard</a><button id="themeBtn" class="btn theme-btn"><span id="themeIcon" class="theme-ico">🌙</span></button></div><h1>🏆 Leaderboard</h1><div class="card"><h3>Hangman</h3><table><thead><tr><th>#</th><th>Nama</th><th>Skor</th><th>Waktu</th></tr></thead><tbody id="h"></tbody></table></div><div class="card"><h3>Fruit Ninja</h3><table><thead><tr><th>#</th><th>Nama</th><th>Skor</th><th>Waktu</th></tr></thead><tbody id="f"></tbody></table></div><script>(function(){const t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.classList.add('light');themeIcon.textContent=t==='light'?'☀️':'🌙';})();themeBtn.onclick=()=>{document.documentElement.classList.toggle('light');const t=document.documentElement.classList.contains('light')?'light':'dark';localStorage.setItem('theme',t);themeIcon.textContent=t==='light'?'☀️':'🌙';};function row(r,i){return `<tr><td>${i+1}</td><td>${r.displayName||r.playerName||'Guest'}</td><td><b>${r.score}</b></td><td>${new Date(r.createdAt).toLocaleString('id-ID')}</td></tr>`}async function load(game,el){const res=await fetch(`/api/scores/${game}/top?limit=20`);const j=await res.json();const rows=j.rows||[];document.getElementById(el).innerHTML=rows.length?rows.map(row).join(''):'<tr><td colspan="4">Belum ada skor</td></tr>'}load('hangman','h');load('fruit-ninja','f');</script></body></html>
