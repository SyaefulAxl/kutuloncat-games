<!doctype html><html lang="id"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Achievements</title><style>:root{--bg:#0b1220;--panel:#121a2b;--txt:#e8eefc;--muted:#9fb0d8;--bd:#25314f}:root.light{--bg:#eef3ff;--panel:#fff;--txt:#111827;--muted:#4b5563;--bd:#c5d2ec}*{box-sizing:border-box;transition:background-color .25s,color .25s,border-color .25s}body{font-family:Inter,system-ui;background:var(--bg);color:var(--txt);max-width:900px;margin:0 auto;padding:12px}.top{display:flex;justify-content:space-between;align-items:center}.card{background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:12px;margin:10px 0}.chip{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid #3557a0;margin-left:8px}.common{color:#d1d5db}.uncommon{color:#86efac}.rare{color:#93c5fd}.epic{color:#c4b5fd}.legendary{color:#fcd34d}.btn{padding:8px 10px;border-radius:8px;border:1px solid #3557a0;background:#18326a;color:#fff;text-decoration:none;cursor:pointer}.theme-btn{max-width:56px}.theme-ico{display:inline-block;transition:transform .35s}:root.light .theme-ico{transform:rotate(180deg)}.muted{color:var(--muted)}</style></head><body><div class="top"><a href="/" style="color:#60a5fa">← Dashboard</a><button id="themeBtn" class="btn theme-btn"><span id="themeIcon" class="theme-ico">🌙</span></button></div><h1>🏆 Achievements</h1><div id="stats" class="card"></div><div id="list"></div><script>(function(){const t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.classList.add('light');themeIcon.textContent=t==='light'?'☀️':'🌙';})();themeBtn.onclick=()=>{document.documentElement.classList.toggle('light');const t=document.documentElement.classList.contains('light')?'light':'dark';localStorage.setItem('theme',t);themeIcon.textContent=t==='light'?'☀️':'🌙';};async function load(){const me=await (await fetch('/api/me')).json();if(!me.ok){location.href='/login';return;}const r=await fetch('/api/achievements/catalog');const j=await r.json();if(!j.ok){list.innerHTML='<div class="card">Gagal load achievements</div>';return;}const s=j.stats||{unlocked:0,total:0,totalPoints:0,progress:0};stats.innerHTML=`<b>${s.unlocked}/${s.total}</b> terbuka • <b>${s.totalPoints}</b> points • <b>${s.progress}%</b> complete`;list.innerHTML=(j.rows||[]).map(x=>`<div class='card'>${x.unlocked?'✅':'🔒'} <b>${x.title}</b><span class='chip ${x.rarity}'>${x.rarity}</span><div class='muted'>${x.points} points • ${x.game}</div></div>`).join('');}load();</script></body></html>
